# On release: npm publish, then MCP Registry metadata via mcp-publisher (GitHub OIDC — no MCP-specific secrets).
# npm: https://docs.npmjs.com/cli/v8/commands/npm-publish
# MCP Registry + OIDC: https://github.com/modelcontextprotocol/registry/blob/main/docs/modelcontextprotocol-io/github-actions.mdx

name: Publish NPM on Release

on:
    release:
        types: [published]

permissions:
    id-token: write # Required for OIDC
    contents: read

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-node@v6
              with:
                  node-version-file: ./package.json

            - run: npm ci
            - run: npm run build
            - run: npm test

    publish-npm:
        needs: build
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-node@v6
              with:
                  node-version-file: ./package.json
                  registry-url: https://registry.npmjs.org/
            - run: npm ci
            - run: npm publish

            # Uses workflow permissions.id-token (github-oidc). If this fails with an auth error, compare
            # repository/org Actions settings with https://github.com/modelcontextprotocol/registry/blob/main/docs/modelcontextprotocol-io/github-actions.mdx
            - name: Install mcp-publisher
              run: |
                  set -euo pipefail
                  curl -fsSL "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz" | tar xz mcp-publisher
                  chmod +x mcp-publisher

            - name: Sync server.json versions from package.json
              run: |
                  node <<'NODE'
                  const fs = require('fs');
                  const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
                  const server = JSON.parse(fs.readFileSync('server.json', 'utf8'));
                  server.version = pkg.version;
                  server.packages[0].version = pkg.version;
                  fs.writeFileSync('server.json', JSON.stringify(server, null, 2) + '\n');
                  NODE

            - name: Authenticate to MCP Registry (GitHub OIDC)
              run: ./mcp-publisher login github-oidc

            - name: Publish MCP Registry metadata
              run: ./mcp-publisher publish

            - name: Close release milestone if empty
              env:
                  GH_TOKEN: ${{ github.token }}
                  REPO: ${{ github.repository }}
                  RELEASE_TAG: ${{ github.event.release.tag_name }}
              run: |
                  set -euo pipefail

                  owner="${REPO%%/*}"
                  repo="${REPO##*/}"

                  milestone_title="${RELEASE_TAG#v}"

                  if [ -z "${milestone_title}" ]; then
                    echo "Could not parse milestone version from release tag (tag=${RELEASE_TAG})."
                    exit 0
                  fi

                  milestones_json="$(gh api "repos/${owner}/${repo}/milestones?state=open&per_page=100")"

                  milestone_number="$(echo "$milestones_json" | jq -r \
                    --arg milestone_title "$milestone_title" \
                    '($milestone_title | gsub("\\."; "\\\\.")) as $escaped_milestone_title
                    | .[]
                    | select(.title | test("^" + $escaped_milestone_title + "($|[ :a-z0-9-])"))
                    | .number' \
                    | head -n1)"

                  if [ -z "${milestone_number}" ] || [ "${milestone_number}" = "null" ]; then
                    echo "No matching open milestone found for parsed version '${milestone_title}'."
                    exit 0
                  fi

                  milestone="$(gh api "repos/${owner}/${repo}/milestones/${milestone_number}")"
                  state="$(echo "$milestone" | jq -r '.state')"
                  open_issues="$(echo "$milestone" | jq -r '.open_issues')"
                  title="$(echo "$milestone" | jq -r '.title')"

                  echo "Matched milestone #${milestone_number} '${title}' (state=${state}, open_issues=${open_issues})."

                  if [ "$state" != "open" ]; then
                    echo "Milestone is already closed. Nothing to do."
                    exit 0
                  fi

                  if [ "$open_issues" -ne 0 ]; then
                    echo "Milestone has open items. Skipping close."
                    exit 0
                  fi

                  gh api -X PATCH "repos/${owner}/${repo}/milestones/${milestone_number}" -f state="closed" >/dev/null
                  echo "Milestone #${milestone_number} closed."
